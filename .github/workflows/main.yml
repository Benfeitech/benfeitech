name: WhatsApp Bot

# Runs the bot on GitHub Actions instead of Replit. A single job can't run
# forever (GitHub caps every job at 6 hours), so this restarts itself every
# 6 hours automatically via the schedule trigger, picking up exactly where
# the previous run left off using the encrypted session backup committed
# back to the repo at the end of each run.
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'WhatsApp number to pair (country code, no + or spaces) — only needed once per new number, leave blank otherwise'
        required: false
        default: ''

# Queue instead of overlapping runs — never let two jobs manage the same
# WhatsApp session at once.
concurrency:
  group: whatsapp-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # stay under GitHub's hard 360-minute job cap, leaving time to save state before it's killed
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Restore WhatsApp session from encrypted backup
        env:
          SESSION_ENCRYPT_KEY: ${{ secrets.SESSION_ENCRYPT_KEY }}
        run: node scripts/session-backup.mjs unpack

      - name: Run bot until this job's time budget runs out
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          ZST_API_KEY: ${{ secrets.ZST_API_KEY }}
          PAIR_NUMBER: ${{ github.event.inputs.phone_number }}
        # 20400s = 340 minutes, leaving a ~10 minute buffer before the job's own 350-minute timeout
        # to save the session below instead of getting hard-killed mid-write.
        run: timeout 20400s node ci-run.js || true

      - name: Save WhatsApp session to encrypted backup
        if: always()
        env:
          SESSION_ENCRYPT_KEY: ${{ secrets.SESSION_ENCRYPT_KEY }}
        run: node scripts/session-backup.mjs pack

      - name: Commit and push updated session backup
        if: always()
        run: |
          git config user.name "whatsapp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add session-backup.enc
          if git diff --staged --quiet; then
            echo "No session changes to commit."
          else
            git commit -m "Update WhatsApp session backup [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
