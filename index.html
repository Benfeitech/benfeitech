<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benfei Vision Lab | AI Video</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #020617;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100%;
            overflow-x: hidden;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; }

        /* --- Updated Splash Screen --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            font-family: 'JetBrains Mono', monospace;
            transition: opacity 0.6s ease;
        }

        .splash-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .loader-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border: 4px solid #1e293b;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        .ai-center-icon {
            font-size: 50px;
            color: var(--primary);
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
        }

        #percent-text { color: var(--primary); font-size: 1.5rem;
        margin-top: 20px; margin-bottom: 10px; z-index: 3; }

        /* --- Main UI --- */
        #main-content {
            display: none; position: relative; z-index: 10;
            max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center;
        }

        .video-card {
            background: var(--card-bg); padding: 40px;
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        textarea {
            width: 100%; height: 100px; padding: 15px;
            border-radius: 12px; border: 1px solid #334155;
            background: #0f172a; color: white; font-size: 1rem;
            resize: none; margin-bottom: 20px; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }
        textarea:focus { border-color: var(--primary); }

        button {
            width: 100%; padding: 15px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        video {
            width: 100%; max-width: 600px; border-radius: 12px;
            margin-top: 20px; border: 2px solid var(--primary);
            background: #000;
        }

        .download-btn {
            display: inline-block; margin-top: 20px;
            background: #3b82f6; color: #fff;
            padding: 12px 30px; border-radius: 8px;
            font-weight: 600; cursor: pointer; border: none;
            transition: 0.3s; width: auto !important;
        }

        footer { margin-top: 50px; color: #64748b; font-size: 0.9rem; }
        .heart-icon { color: #fff; display: inline-block; animation: pulse 2.5s infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.2) translateY(-5px); } }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div id="splash-screen">
        <div class="splash-container">
            <div class="loader-ring"></div>
            <i class="fas fa-microchip ai-center-icon"></i>
        </div>
        <div id="percent-text">0%</div>
        <div id="status-text" style="color:#64748b; letter-spacing: 2px;">WAKING UP AI CORES...</div>
    </div>

    <div id="main-content">
        <h1><i class="fas fa-microchip"></i> Benfei Vision Lab</h1>
        <p style="margin-bottom: 40px; opacity: 0.7;">High-fidelity AI video generation.</p>

        <div class="video-card">
            <textarea id="video-prompt" placeholder="Describe your cinematic scene..."></textarea>
            <button id="gen-btn">GENERATE VIDEO</button>

            <div id="loading-area" style="display:none; margin-top: 30px;">
                <i class="fas fa-sync fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 10px;"></i>
                <p>Synthesizing neural frames... please wait.</p>
            </div>

            <div id="video-result" style="display:none;"></div>
        </div>

        <footer>
            Made with <i class="fas fa-heart heart-icon"></i> by Benfei Tech
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Splash Logic
        let progress = 0;
        const messages = ["BOOTING CORES...", "LOADING NEURAL MAPS...", "CONNECTING TO BENFEI SERVER...", "READY FOR INPUT"];
        
        const splashInt = setInterval(() => {
            progress += Math.floor(Math.random() * 3) + 1;
            if(progress > 100) progress = 100;
            document.getElementById('percent-text').innerText = progress + '%';
            
            if(progress > 80) document.getElementById('status-text').innerText = messages[2];
            else if(progress > 40) document.getElementById('status-text').innerText = messages[1];

            if(progress === 100) {
                document.getElementById('status-text').innerText = messages[3];
                clearInterval(splashInt);
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                        initParticles();
                    }, 600);
                }, 500);
            }
        }, 100);

        // Blob Download Function
        async function forceDownload(url) {
            const dlBtn = document.getElementById('dl-btn');
            const originalText = dlBtn.innerHTML;
            dlBtn.disabled = true;
            dlBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PREPARING FILE...';

            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `Benfei_AI_Video_${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            } finally {
                dlBtn.disabled = false;
                dlBtn.innerHTML = originalText;
            }
        }

        const genBtn = document.getElementById('gen-btn');
        const videoResult = document.getElementById('video-result');
        const loadingArea = document.getElementById('loading-area');

        genBtn.onclick = async () => {
            const prompt = document.getElementById('video-prompt').value.trim();
            if(!prompt) return;

            genBtn.disabled = true;
            loadingArea.style.display = 'block';
            videoResult.style.display = 'none';

            try {
                const response = await fetch(`https://eliteprotech-apis.zone.id/aivideo?q=${encodeURIComponent(prompt)}&type=video`);
                const data = await response.json();

                if(data.success && data.result.url) {
                    videoResult.innerHTML = `
                        <video controls autoplay loop>
                            <source src="${data.result.url}" type="video/mp4">
                        </video>
                        <br>
                        <button id="dl-btn" class="download-btn">
                            <i class="fas fa-download"></i> SAVE TO DEVICE
                        </button>
                    `;
                    videoResult.style.display = 'block';
                    document.getElementById('dl-btn').onclick = () => forceDownload(data.result.url);
                } else {
                    alert("API limit reached or error.");
                }
            } catch (e) {
                alert("Connection failed.");
            } finally {
                genBtn.disabled = false;
                loadingArea.style.display = 'none';
            }
        };

        function initParticles() {
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 60 },
                    "color": { "value": "#3b82f6" },
                    "line_linked": { "color": "#3b82f6", "opacity": 0.2 },
                    "move": { "speed": 1.5 }
                }
            });
        }
    </script>
</body>
</html>
